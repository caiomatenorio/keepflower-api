databaseChangelog:
  - changeSet:
      id: 002-create-table-sessions
      author: caiomatenorio
      changes:
        - createTable:
            tablename: session 
            columns:
              - column:
                  name: id
                  type: uuid 
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid 
                  constraints:
                    nullable: false
              - column:
                  name: refresh_token
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp 
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: session
            baseColumnNames: user_id
            constraintName: fk_session_user_id
            referencedTableName: users
            referencedColumnNames: id 
            onDelete: CASCADE

